<?xml version="1.0" encoding="UTF-8"?>
<!--
  光影破壁者 Light-Breaker — App Icon
  暗夜破光版 · 拳套 + 闪电
  Master: 1024 × 1024 px  ·  Corner radius rx="221" (~21.5%)
  2026 · Light-Breaker / BoxingFitness Design Team
-->
<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg"
  role="img">

  <title>光影破壁者 Light-Breaker App Icon — 暗夜破光版</title>
  <desc>
    深空暗夜背景，8条放射光芒，12块破碎飞散瓷砖，
    中央金橙拳套（手指节+护腕），拳套正面叠加白→黄→金闪电图案，
    双冲击波环，底部 Light-Breaker / 光影破壁者 文字。
    适用场景：BoxingFitness 视觉拆盲盒拳击互动模式。
  </desc>

  <defs>

    <!-- ── 背景渐变 深空暗夜 ── -->
    <linearGradient id="g_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0A0810"/>
      <stop offset="55%"  stop-color="#12101E"/>
      <stop offset="100%" stop-color="#0C0A14"/>
    </linearGradient>

    <!-- ── 中心光爆 金橙放射 ── -->
    <radialGradient id="g_burst" cx="50%" cy="47%" r="45%">
      <stop offset="0%"   stop-color="#FFD060" stop-opacity="0.58"/>
      <stop offset="40%"  stop-color="#FF8C00" stop-opacity="0.28"/>
      <stop offset="75%"  stop-color="#FF4400" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
    </radialGradient>

    <!-- ── 拳套主体渐变 暖金橙 ── -->
    <radialGradient id="g_fist" cx="38%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#FFC840"/>
      <stop offset="45%"  stop-color="#E07800"/>
      <stop offset="75%"  stop-color="#B05000"/>
      <stop offset="100%" stop-color="#8C3800"/>
    </radialGradient>

    <!-- ── 指节高光 ── -->
    <linearGradient id="g_knuckle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFD860"/>
      <stop offset="100%" stop-color="#E08800"/>
    </linearGradient>

    <!-- ── 护腕渐变 ── -->
    <linearGradient id="g_cuff" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A04800"/>
      <stop offset="100%" stop-color="#6A2800"/>
    </linearGradient>

    <!-- ── 闪电主体 白→淡黄→金 ── -->
    <linearGradient id="g_bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="28%"  stop-color="#FFF8C0"/>
      <stop offset="65%"  stop-color="#FFE840"/>
      <stop offset="100%" stop-color="#FFCC00"/>
    </linearGradient>

    <!-- ── 闪电外发光晕 ── -->
    <radialGradient id="g_bolt_glow" cx="50%" cy="48%" r="50%">
      <stop offset="0%"   stop-color="#FFFF88" stop-opacity="0.75"/>
      <stop offset="55%"  stop-color="#FFE840" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFE840" stop-opacity="0"/>
    </radialGradient>

    <!-- ── 圆角裁切 ── -->
    <clipPath id="icon_clip">
      <rect width="1024" height="1024" rx="221"/>
    </clipPath>

  </defs>

  <g clip-path="url(#icon_clip)">

    <!-- ══════════════════════════════════════
         背景
    ══════════════════════════════════════ -->
    <rect width="1024" height="1024" fill="url(#g_bg)"/>

    <!-- 背景星点 -->
    <circle cx="188" cy="154" r="7.7"  fill="#FFD060" opacity="0.50"/>
    <circle cx="837" cy="120" r="6.0"  fill="#FF8C00" opacity="0.40"/>
    <circle cx="922" cy="478" r="5.1"  fill="#FFD060" opacity="0.35"/>
    <circle cx="120" cy="632" r="6.0"  fill="#FFA040" opacity="0.40"/>
    <circle cx="871" cy="768" r="5.1"  fill="#FFD060" opacity="0.30"/>
    <circle cx="291" cy="871" r="4.3"  fill="#FF8C00" opacity="0.35"/>
    <circle cx="640" cy="94"  r="4.3"  fill="#FFD060" opacity="0.28"/>
    <circle cx="86"  cy="316" r="3.4"  fill="#FFC040" opacity="0.32"/>
    <circle cx="948" cy="214" r="3.4"  fill="#FFB030" opacity="0.28"/>

    <!-- ══════════════════════════════════════
         中心光爆
    ══════════════════════════════════════ -->
    <ellipse cx="512" cy="482" rx="342" ry="342" fill="url(#g_burst)"/>

    <!-- ══════════════════════════════════════
         8条放射光芒三角形
    ══════════════════════════════════════ -->
    <!-- 右 -->
    <polygon points="512,482 683,439 666,529" fill="#FFD060" opacity="0.18"/>
    <!-- 右上 -->
    <polygon points="512,482 649,316 683,393" fill="#FFE080" opacity="0.16"/>
    <!-- 上 -->
    <polygon points="512,482 469,299 555,299" fill="#FFD060" opacity="0.18"/>
    <!-- 左上 -->
    <polygon points="512,482 341,316 376,393" fill="#FFE080" opacity="0.16"/>
    <!-- 左 -->
    <polygon points="512,482 341,439 341,529" fill="#FFD060" opacity="0.18"/>
    <!-- 左下 -->
    <polygon points="512,482 341,614 376,683" fill="#FFE080" opacity="0.14"/>
    <!-- 下 -->
    <polygon points="512,482 469,665 555,665" fill="#FFD060" opacity="0.16"/>
    <!-- 右下 -->
    <polygon points="512,482 649,614 683,546" fill="#FFE080" opacity="0.14"/>

    <!-- ══════════════════════════════════════
         破碎飞散瓷砖（12块）
         旋转角度模拟击碎飞散状态
    ══════════════════════════════════════ -->
    <!-- 左上象限 -->
    <rect x="171" y="188" width="120" height="86"  rx="17" fill="#2A1E4A" opacity="0.93"
          transform="rotate(-18,231,231)"/>
    <rect x="69"  y="325" width="94"  height="68"  rx="14" fill="#1E1638" opacity="0.88"
          transform="rotate(-32,116,359)"/>
    <rect x="240" y="86"  width="86"  height="60"  rx="13" fill="#342858" opacity="0.83"
          transform="rotate(12,283,116)"/>

    <!-- 右上象限 -->
    <rect x="701" y="120" width="120" height="77"  rx="17" fill="#1E1638" opacity="0.93"
          transform="rotate(22,761,158)"/>
    <rect x="819" y="257" width="86"  height="68"  rx="14" fill="#2A1E4A" opacity="0.88"
          transform="rotate(38,862,291)"/>
    <rect x="632" y="69"  width="77"  height="60"  rx="13" fill="#342858" opacity="0.83"
          transform="rotate(-14,670,99)"/>

    <!-- 左下象限 -->
    <rect x="86"  y="615" width="111" height="77"  rx="17" fill="#2A1E4A" opacity="0.90"
          transform="rotate(25,141,653)"/>
    <rect x="188" y="751" width="86"  height="68"  rx="14" fill="#1E1638" opacity="0.85"
          transform="rotate(-20,231,785)"/>

    <!-- 右下象限 -->
    <rect x="768" y="666" width="120" height="77"  rx="17" fill="#2A1E4A" opacity="0.90"
          transform="rotate(-28,828,704)"/>
    <rect x="683" y="785" width="86"  height="60"  rx="14" fill="#1E1638" opacity="0.85"
          transform="rotate(18,726,815)"/>
    <rect x="853" y="529" width="77"  height="68"  rx="13" fill="#342858" opacity="0.80"
          transform="rotate(42,891,563)"/>
    <!-- 额外碎片（增加丰富度）-->
    <rect x="128" y="94"  width="68"  height="51"  rx="11" fill="#241A3E" opacity="0.78"
          transform="rotate(8,162,119)"/>

    <!-- ══════════════════════════════════════
         飞散轨迹线（从中心到碎片）
    ══════════════════════════════════════ -->
    <line x1="512" y1="482" x2="205" y2="222"  stroke="#FFD060" stroke-width="6.0" stroke-linecap="round" opacity="0.28"/>
    <line x1="512" y1="482" x2="103" y2="359"  stroke="#FFA040" stroke-width="5.1" stroke-linecap="round" opacity="0.22"/>
    <line x1="512" y1="482" x2="752" y2="154"  stroke="#FFD060" stroke-width="6.0" stroke-linecap="round" opacity="0.28"/>
    <line x1="512" y1="482" x2="854" y2="291"  stroke="#FFA040" stroke-width="5.1" stroke-linecap="round" opacity="0.22"/>
    <line x1="512" y1="482" x2="120" y2="649"  stroke="#FFD060" stroke-width="5.1" stroke-linecap="round" opacity="0.22"/>
    <line x1="512" y1="482" x2="222" y2="785"  stroke="#FFA040" stroke-width="4.7" stroke-linecap="round" opacity="0.20"/>
    <line x1="512" y1="482" x2="820" y2="700"  stroke="#FFD060" stroke-width="5.1" stroke-linecap="round" opacity="0.22"/>
    <line x1="512" y1="482" x2="717" y2="820"  stroke="#FFA040" stroke-width="4.7" stroke-linecap="round" opacity="0.20"/>

    <!-- ══════════════════════════════════════
         拳套主体
         坐标系：中心约 (512, 462)
         整体高度约 256px，宽度约 273px
    ══════════════════════════════════════ -->

    <!-- 护腕 -->
    <rect x="401" y="547" width="222" height="77"  rx="26" fill="url(#g_cuff)" opacity="0.94"/>
    <!-- 护腕高光条 -->
    <rect x="418" y="554" width="85"  height="15"  rx="7.5" fill="white" opacity="0.16"/>
    <!-- 护腕纹路线 -->
    <line x1="418" y1="578" x2="606" y2="578" stroke="#6A2800" stroke-width="2.6" stroke-linecap="round" opacity="0.55"/>

    <!-- 拳套主体 -->
    <rect x="376" y="367" width="273" height="196" rx="60"  fill="url(#g_fist)" opacity="0.97"/>

    <!-- 手指节顶面 -->
    <rect x="384" y="324" width="256" height="94"  rx="47"  fill="url(#g_knuckle)" opacity="0.94"/>

    <!-- 三个指节细节圆角方块 -->
    <rect x="393" y="316" width="68"  height="60"  rx="26"  fill="#FFD870" opacity="0.64"/>
    <rect x="486" y="316" width="68"  height="60"  rx="26"  fill="#FFD870" opacity="0.64"/>
    <rect x="571" y="316" width="59"  height="60"  rx="26"  fill="#FFD870" opacity="0.64"/>

    <!-- 拳套正面高光条 -->
    <rect x="393" y="334" width="120" height="21"  rx="10.5" fill="white" opacity="0.26"/>
    <rect x="393" y="367" width="222" height="15"  rx="7.5"  fill="white" opacity="0.13"/>

    <!-- 拳套侧面纹路（指间分隔线）-->
    <line x1="470" y1="350" x2="470" y2="427" stroke="#9C4A00" stroke-width="6.8" stroke-linecap="round" opacity="0.45"/>
    <line x1="554" y1="350" x2="554" y2="427" stroke="#9C4A00" stroke-width="6.8" stroke-linecap="round" opacity="0.45"/>

    <!-- ══════════════════════════════════════
         闪电图案（叠加在拳套正面中央）

         坐标放大到 1024 viewBox：
         原 120px 版本坐标 × (1024/120) ≈ ×8.53

         原始顶点（120 坐标系）→ 放大后（1024坐标系）：
           顶点:  (62,42)   → (529,359)
           折左:  (55,53)   → (469,452)
           折中:  (60,53)   → (512,452)
           底点:  (57,67)   → (486,572)
           右翼:  (67,55)   → (572,469)
           右折:  (62,55)   → (529,469)

         整体已向右偏移 8px（视觉居中补偿）
    ══════════════════════════════════════ -->

    <!-- 闪电外发光晕（椭圆，在闪电下方先渲染）-->
    <ellipse cx="516" cy="461" rx="60" ry="85" fill="url(#g_bolt_glow)"/>

    <!-- 闪电主体多边形 -->
    <polygon
      points="537,359  477,452  520,452  494,572  580,469  537,469"
      fill="url(#g_bolt)"
      opacity="0.97"/>

    <!-- 闪电内芯高光（白色半透明，顶部叠加让顶端更亮）-->
    <polygon
      points="529,376  482,449  516,449  495,548  566,472  531,472"
      fill="white"
      opacity="0.30"/>

    <!-- 闪电顶端强光点 -->
    <ellipse cx="534" cy="368" rx="18" ry="12" fill="white" opacity="0.42"/>

    <!-- 闪电底部反光（落地光效）-->
    <ellipse cx="522" cy="574" rx="26" ry="7.7" fill="#FFEE44" opacity="0.40"/>

    <!-- ══════════════════════════════════════
         拳套冲击波环
    ══════════════════════════════════════ -->
    <circle cx="512" cy="461" r="188"
            fill="none" stroke="#FFD060"
            stroke-width="6.8" opacity="0.36"/>
    <circle cx="512" cy="461" r="239"
            fill="none" stroke="#FF8C00"
            stroke-width="4.3" opacity="0.20"/>

    <!-- ══════════════════════════════════════
         文字区
    ══════════════════════════════════════ -->
    <!-- 文字底托 -->
    <rect x="0" y="819" width="1024" height="205" fill="#060412" opacity="0.82"/>

    <!-- 主标题 Light-Breaker -->
    <text
      x="512" y="912"
      text-anchor="middle"
      font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="111" font-weight="700"
      fill="#FFD060"
      letter-spacing="10.2">Light-Breaker</text>

    <!-- 副标题 光影破壁者 -->
    <text
      x="512" y="976"
      text-anchor="middle"
      font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
      font-size="68" font-weight="400"
      fill="#FF8C00"
      letter-spacing="6.8"
      opacity="0.86">光影破壁者</text>

  </g>
</svg>
